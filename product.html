<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کول‌استور | مشخصات فنی محصول</title>
    <link rel="stylesheet" href="../assets/css/product.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body class="dark-shop-body">

<header>
    <div class="logo">گالری <span>ماتیک</span></div>
    
    <div class="header-search-box">
        <input type="text" id="global-search" placeholder="جستجو در محصولات...">
        <i class='bx bx-search search-icon'></i>
    </div>

    <nav id="nav-menu">
        <a href="index.html" class="active">خانه</a>
        <a href="shop.html">فروشگاه</a>
        <a href="profile.html">حساب کاربری</a>
    </nav>

    <div class="header-right">
        <a href="index.html" class="mobile-nav-icon" title="خانه"><i class='bx bx-home-alt'></i></a>
        
        <a href="shop.html" class="mobile-nav-icon" title="فروشگاه"><i class='bx bx-store'></i></a>

        <button id="dark-mode-toggle" class="theme-btn-header" title="تغییر پوسته"><i class='bx bx-moon'></i></button>
        
        <a href="profile.html" class="profile-btn" title="حساب کاربری"><i class='bx bx-user'></i></a>
        
        <div class="cart-btn" id="cart-trigger-btn" title="سبد خرید">
            <i class='bx bx-cart'></i>
            <span id="cart-count">0</span>
        </div>
    </div>
</header>

    <main class="single-product-section" id="single-product-page">
        
        </main>


    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header"><h3>سبد خرید</h3><i class='bx bx-x' id="close-cart"></i></div>
        <div class="cart-body" id="cart-items-container"></div>
        <div class="cart-footer">
            <div class="total-price"><span>جمع کل:</span><span id="cart-total-price">$0.00</span></div>
            <a href="checkout.html" class="checkout-btn-link">تکمیل خرید</a>
        </div>
    </div>

    <div id="toast-container"></div>
<script src="../assets/js/products.js"></script>

<script src="../assets/js/main.js"></script>

</body>
</html>
