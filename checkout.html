<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کول‌استور | اطلاعات ارسال مرسوله</title>
    <link rel="stylesheet" href="../assets/css/checkout.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body class="dark-shop-body">

<header>
    <div class="logo">گالری <span>ماتیک</span></div>
    
    <div class="header-search-box">
        <input type="text" id="global-search" placeholder="جستجو در محصولات...">
        <i class='bx bx-search search-icon'></i>
    </div>

    <nav id="nav-menu">
        <a href="index.html" class="active">خانه</a>
        <a href="shop.html">فروشگاه</a>
        <a href="profile.html">حساب کاربری</a>
    </nav>

    <div class="header-right">
        <a href="index.html" class="mobile-nav-icon" title="خانه"><i class='bx bx-home-alt'></i></a>
        
        <a href="shop.html" class="mobile-nav-icon" title="فروشگاه"><i class='bx bx-store'></i></a>

        <button id="dark-mode-toggle" class="theme-btn-header" title="تغییر پوسته"><i class='bx bx-moon'></i></button>
        
        <a href="profile.html" class="profile-btn" title="حساب کاربری"><i class='bx bx-user'></i></a>
        
        <div class="cart-btn" id="cart-trigger-btn" title="سبد خرید">
            <i class='bx bx-cart'></i>
            <span id="cart-count">0</span>
        </div>
    </div>
</header>

    <main class="checkout-section">
        <div class="checkout-container">
            <div class="checkout-form-side">
                <h3><i class='bx bx-map'></i> آدرس و مشخصات تحویل گیرنده</h3>
               <form id="final-checkout-form">
    <div class="form-row">
        <div class="form-group">
            <label>نام و نام خانوادگی</label>
            <input type="text" id="checkout-name" required>
        </div>
        <div class="form-group">
            <label>شماره همراه</label>
            <input type="tel" id="checkout-phone" required>
        </div>
    </div>
    
<div class="form-row">
    <div class="form-group">
        <label>استان</label>
        <select id="checkout-province" required>
            <option value="">انتخاب استان...</option>
        </select>
    </div>
    <div class="form-group">
        <label>شهر</label>
        <select id="checkout-city" required disabled>
            <option value="">ابتدا استان را انتخاب کنید...</option>
        </select>
    </div>
</div>


        <div class="form-group">
            <label>واحد</label>
            <input type="text">
        </div>
        <div class="form-group">
            <label>کد پستی ده رقمی</label>
            <input type="text" required>
        </div>
    </div>

    <div class="payment-method-section">
        <label class="section-label">روش پرداخت</label>
        <div class="payment-options">
            <label class="payment-option-card">
                <input type="radio" name="payment_method" value="online" checked>
                <div class="option-content">
                    <i class='bx bx-credit-card-front'></i>
                    <span>پرداخت آنلاین (اتصال به درگاه)</span>
                </div>
            </label>
            
            <!-- این بخش به صورت پیش‌فرض مخفی است و با نوشتن کلمه تهران باز می‌شود -->
            <label class="payment-option-card" id="cod-option-wrapper" style="display: none;">
                <input type="radio" name="payment_method" value="cod">
                <div class="option-content">
                    <i class='bx bx-package'></i>
                    <span>پرداخت درب منزل (مخصوص تهران)</span>
                </div>
            </label>
        </div>
    </div>

    <button type="submit" class="submit-checkout-btn" id="submit-order-btn">تایید و اتصال به درگاه بانکی</button>
</form>
            </div>
            <div class="checkout-summary-side">
                <h3>خلاصه فاکتور</h3>
                <div id="checkout-items-list"></div>
                <div class="summary-total-bar"><span>قابل پرداخت:</span><span id="checkout-final-price">$0.00</span></div>
            </div>
        </div>
    </main>

    <div id="toast-container"></div>
<script src="../assets/js/products.js"></script>

<script src="../assets/js/main.js"></script>

  "هرمزگان": ["بندرعباس", "میناب", "بندر لنگه", "قشم", "رودان", "حاجی‌آباد", "بستک", "جاسک", "پارسیان", "بندر خمیر", "ابوموسی", "سیریک", "بشاگرد"],
  "همدان": ["همدان", "ملایر", "نهاوند", "تویسرکان", "اسدآباد", "بهار", "کبودرآهنگ", "رزن", "فامنین"],
  "یزد": ["یزد", "میبد", "اردکان", "مهریز", "بافق", "تفت", "ابرکوه", "اشکذر", "خاتم", "بهاباد"]
};

document.addEventListener('DOMContentLoaded', () => {
    const provinceSelect = document.getElementById('checkout-province');
    const citySelect = document.getElementById('checkout-city');
    const codOptionWrapper = document.getElementById('cod-option-wrapper');
    const submitBtn = document.getElementById('submit-order-btn');
    const onlinePaymentRadio = document.querySelector('input[name="payment_method"][value="online"]');
    const codPaymentRadio = document.querySelector('input[name="payment_method"][value="cod"]');

    if (provinceSelect) {
        // ۱. پر کردن لیست استان‌ها به صورت داینامیک
        for (let province in iranData) {
            let option = document.createElement('option');
            option.value = province;
            option.textContent = province;
            provinceSelect.appendChild(option);
        }

        // ۲. واکنش به انتخاب استان
        provinceSelect.addEventListener('change', function() {
            const selectedProvince = this.value;
            citySelect.innerHTML = '<option value="">انتخاب شهر...</option>';
            
            if (selectedProvince && iranData[selectedProvince]) {
                citySelect.disabled = false;
                iranData[selectedProvince].forEach(city => {
                    let option = document.createElement('option');
                    option.value = city;
                    option.textContent = city;
                    citySelect.appendChild(option);
                });
            } else {
                citySelect.disabled = true;
                citySelect.innerHTML = '<option value="">ابتدا استان را انتخاب کنید...</option>';
            }

            // ۳. شرط فعال‌سازی پرداخت درب منزل مخصوص استان تهران
            if (selectedProvince === 'تهران') {
                codOptionWrapper.style.display = 'block';
            } else {
                codOptionWrapper.style.display = 'none';
                if (onlinePaymentRadio) onlinePaymentRadio.checked = true;
                submitBtn.textContent = 'تایید و اتصال به درگاه بانکی';
            }
        });
    }

    // ۴. آپدیت کردن متن دکمه متناسب با انتخاب نوع پرداخت
    const paymentRadios = document.querySelectorAll('input[name="payment_method"]');
    paymentRadios.forEach(radio => {
        radio.addEventListener('change', () => {
            if (codPaymentRadio && codPaymentRadio.checked) {
                submitBtn.textContent = 'ثبت نهایی سفارش (پرداخت درب منزل)';
            } else {
                submitBtn.textContent = 'تایید و اتصال به درگاه بانکی';
            }
        });
    });
});
</script>

</body>
</html>
